<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Base Documentaire — Protocoles Crèche</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --ink: #1C1917; --ink2: #44403C;
    --ink3: #A8A29E; --border: #E7E5E0; --accent: #5C6BC0; --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .app-header h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  .app-header p { font-size: 12px; color: var(--ink3); margin-top: 2px; }
  .app-body { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; box-shadow: var(--shadow); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.5px; }
  .filtres-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input { flex: 2; min-width: 200px; padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; background: var(--surface); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .select-filtre { flex: 1; min-width: 150px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 13px; background: var(--surface); cursor: pointer; font-family: inherit; }
  .vue-btns { display: flex; gap: 6px; }
  .vue-btn { width: 38px; height: 38px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 16px; background: var(--surface); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .vue-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .liste-container { display: flex; flex-direction: column; gap: 8px; }
  .liste-item { background: var(--surface); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; box-shadow: var(--shadow); border: 1px solid var(--border); transition: box-shadow 0.2s, transform 0.15s; }
  .liste-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .cat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .doc-titre { font-weight: 700; font-size: 15px; color: var(--ink); }
  .doc-desc { margin: 5px 0 8px; font-size: 13px; color: var(--ink3); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
  .doc-meta { display: flex; gap: 14px; font-size: 12px; color: var(--ink3); flex-wrap: wrap; }
  .badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
  .statut-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
  .grille-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .carte-doc { background: var(--surface); border-radius: var(--radius); padding: 18px; cursor: pointer; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 180px; transition: transform 0.15s; }
  .carte-doc:hover { transform: translateY(-2px); }
  .grille-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 8px; }
  .carte-cat { background: var(--surface); border-radius: 12px; padding: 14px 16px; display: flex; gap: 12px; align-items: center; cursor: pointer; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.15s; }
  .carte-cat:hover { transform: translateY(-1px); }
  .detail-page { max-width: 700px; margin: 0 auto; }
  .detail-card { background: var(--surface); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-item { background: var(--bg); border-radius: 10px; padding: 14px 16px; }
  .detail-label { font-size: 11px; color: var(--ink3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .form-card { background: var(--surface); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); max-width: 700px; margin: 0 auto; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 600; color: var(--ink2); }
  input, select, textarea { padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; outline: none; font-family: inherit; background: var(--bg); color: var(--ink); transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 100px; resize: vertical; }
  .btn-primary { padding: 11px 24px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { padding: 11px 24px; background: var(--surface); color: var(--ink2); border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-danger { color: #e74c3c !important; border-color: #e74c3c !important; }
  .btn-back { background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; font-weight: 600; font-family: inherit; padding: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  .notif { position: fixed; top: 20px; right: 20px; color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 14px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .vide { text-align: center; color: var(--ink3); padding: 40px; font-size: 15px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin: 32px 0 14px; color: var(--ink2); }
  .count-info { color: var(--ink3); font-size: 13px; margin-bottom: 12px; }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div class="app-header">
  <div>
    <h1>📚 Base Documentaire</h1>
    <p>Protocoles & documents de fonctionnement de la crèche</p>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn-secondary" onclick="document.getElementById('import-file-input').click()" style="display:flex;align-items:center;gap:6px">
      📄 Importer Word / PDF
    </button>
    <input type="file" id="import-file-input" accept=".docx,.pdf" style="display:none" onchange="importerFichier(event)">
    <button class="btn-primary" onclick="ouvrirFormulaire()">+ Ajouter un document</button>
  </div>
</div>
<div id="notif-container"></div>
<div id="app" class="app-body"></div>

<script>
const CATEGORIES = [
  { id:"hygiene",       label:"Hygiène & Soins",           icon:"🧼", color:"#4ECDC4" },
  { id:"securite",      label:"Sécurité",                  icon:"🛡️", color:"#FF6B6B" },
  { id:"sante",         label:"Santé & Médicaments",       icon:"💊", color:"#45B7D1" },
  { id:"alimentation",  label:"Alimentation",              icon:"🍽️", color:"#96CEB4" },
  { id:"pedagogie",     label:"Pédagogie & Activités",     icon:"🎨", color:"#FFEAA7" },
  { id:"administratif", label:"Administratif",             icon:"📋", color:"#DDA0DD" },
  { id:"urgence",       label:"Urgences",                  icon:"🚨", color:"#FF8C00" },
  { id:"accueil",       label:"Accueil & Communication",   icon:"👶", color:"#98D8C8" },
];
const STATUTS = [
  { id:"vigueur",  label:"En vigueur", color:"#2ecc71" },
  { id:"revision", label:"À réviser",  color:"#f39c12" },
  { id:"archive",  label:"Archivé",    color:"#95a5a6" },
];
const DOCS_DEFAUT = [
  { id:1,  titre:"Protocole de change et hygiène du nourrisson", categorie:"hygiene", statut:"vigueur", dateRevision:"2024-09-01", description:"Procédure complète pour le change, le lavage des mains, la désinfection du matériel.", responsable:"Directrice", version:"v2.1",
    objectif:"Garantir l'hygiène de l'enfant et prévenir les infections croisées lors du change.",
    etapes:"1. Préparer le plan de change avec le matériel nécessaire\n2. Se laver les mains avant et après le change\n3. Poser l'enfant sur le plan de change en maintenant une main sur lui\n4. Retirer la couche souillée et la mettre dans le sac poubelle fermé\n5. Nettoyer les fesses avec une lingette ou gant humide de l'avant vers l'arrière\n6. Mettre la couche propre\n7. Rhabiller l'enfant\n8. Désinfecter le plan de change avec le produit désinfectant",
    notes:"Ne jamais laisser un enfant seul sur le plan de change.\nTracer le change dans le cahier de liaison." },
  { id:2,  titre:"Plan d'évacuation incendie", categorie:"securite", statut:"vigueur", dateRevision:"2024-06-15", description:"Itinéraires d'évacuation, point de rassemblement, rôles de chaque membre du personnel.", responsable:"Responsable sécurité", version:"v1.3",
    objectif:"Assurer l'évacuation rapide et sécurisée de tous les enfants et adultes en cas d'incendie.",
    etapes:"1. Déclencher l'alarme incendie\n2. Appeler le 18 (pompiers)\n3. Prendre les couchages des bébés (sans perdre de temps)\n4. Faire sortir les enfants par l'itinéraire d'évacuation affiché\n5. Se diriger vers le point de rassemblement (entrée du parking)\n6. Faire l'appel de tous les enfants et adultes\n7. Attendre les secours et ne pas réintégrer les locaux",
    notes:"Exercice d'évacuation obligatoire 2 fois par an.\nLes plans d'évacuation sont affichés à chaque entrée." },
  { id:3,  titre:"Protocole de gestion des médicaments", categorie:"sante", statut:"vigueur", dateRevision:"2024-01-10", description:"Conditions de stockage, administration sur ordonnance, registre de suivi.", responsable:"Infirmière", version:"v3.0",
    objectif:"Assurer la sécurité de l'administration des médicaments aux enfants accueillis.",
    etapes:"1. Vérifier la prescription médicale (ordonnance datée et signée)\n2. Vérifier l'identité de l'enfant\n3. Vérifier le médicament (nom, dosage, date de péremption)\n4. Administrer le médicament selon la prescription\n5. Tracer l'administration dans le registre de soins\n6. Informer les parents en fin de journée",
    notes:"Aucun médicament ne peut être administré sans ordonnance en cours de validité.\nLes médicaments sont stockés sous clé." },
  { id:4,  titre:"Procédure d'introduction alimentaire", categorie:"alimentation", statut:"revision", dateRevision:"2023-11-20", description:"Diversification alimentaire progressive, allergènes, textures par tranche d'âge.", responsable:"Puéricultrice", version:"v1.8", objectif:"", etapes:"", notes:"" },
  { id:5,  titre:"Protocole conduite à tenir en cas de fièvre", categorie:"sante", statut:"vigueur", dateRevision:"2024-03-05", description:"Seuils d'alerte, mesures de température, contact avec les parents et le médecin.", responsable:"Infirmière", version:"v2.0",
    objectif:"Définir la conduite à tenir face à un enfant fiévreux pour assurer sa sécurité.",
    etapes:"1. Prendre la température (tympanique ou axillaire)\n2. Si T° > 38°C : déshabiller l'enfant, proposer à boire\n3. Si T° > 38,5°C : appeler les parents pour récupérer l'enfant\n4. Si T° > 39°C ou convulsions : appeler le 15 (SAMU)\n5. Tracer la température et les actions dans le cahier de soins\n6. Informer la directrice",
    notes:"Un enfant fiévreux ne peut pas être gardé en structure.\nAucun médicament antipyrétique sans ordonnance." },
  { id:6,  titre:"Règlement intérieur de la crèche", categorie:"administratif", statut:"vigueur", dateRevision:"2024-01-01", description:"Horaires, facturation, droits et obligations des familles et du personnel.", responsable:"Directrice", version:"v4.2", objectif:"", etapes:"", notes:"" },
  { id:7,  titre:"Projet pédagogique annuel", categorie:"pedagogie", statut:"vigueur", dateRevision:"2024-09-01", description:"Objectifs éducatifs, thèmes mensuels, activités d'éveil et de motricité.", responsable:"Équipe pédagogique", version:"v2025", objectif:"", etapes:"", notes:"" },
  { id:8,  titre:"Protocole d'accueil de l'enfant porteur de handicap", categorie:"accueil", statut:"revision", dateRevision:"2023-07-12", description:"Aménagements, partenariats avec les professionnels de santé spécialisés.", responsable:"Directrice", version:"v1.0", objectif:"", etapes:"", notes:"" },
  { id:9,  titre:"Fiche de conduite en cas d'accident", categorie:"urgence", statut:"vigueur", dateRevision:"2024-02-28", description:"Numéros d'urgence, premiers secours, rédaction du rapport d'incident.", responsable:"Toute l'équipe", version:"v2.3",
    objectif:"Définir les actions immédiates à mener en cas d'accident d'un enfant dans la structure.",
    etapes:"1. Rester calme et sécuriser le lieu\n2. Évaluer l'état de l'enfant (conscience, respiration)\n3. Si urgence vitale : appeler le 15 (SAMU)\n4. Si blessure mineure : soins de premiers secours\n5. Appeler les parents immédiatement\n6. Rédiger le rapport d'incident\n7. Informer la directrice\n8. Conserver le rapport dans le dossier de l'enfant",
    notes:"Le rapport d'incident est obligatoire pour tout accident, même bénin.\nNe jamais déplacer un enfant inconscient." },
  { id:10, titre:"Protocole d'adaptation (période de familiarisation)", categorie:"accueil", statut:"vigueur", dateRevision:"2024-08-20", description:"Étapes de l'adaptation progressive, rôle des parents, suivi du bien-être de l'enfant.", responsable:"Référente de section", version:"v1.5", objectif:"", etapes:"", notes:"" },
  { id:11, titre:"Protocole arrêt cardio-respiratoire", categorie:"urgence", statut:"vigueur", dateRevision:"2024-09-01", description:"Conduite à tenir en cas d'inconscience et d'absence de respiration chez un nourrisson ou enfant.", responsable:"Toute l'équipe", version:"v1.0",
    objectif:"Réaliser une réanimation cardio-pulmonaire (RCP) dans les meilleures conditions en attendant les secours.",
    etapes:"1. Noter l'heure\n2. Regarder si corps étranger intra-buccal : si oui l'extraire au doigt\n3. Faire 5 insufflations\n4. Faire 15 compressions thoraciques\n5. Appeler à l'aide / crier pour :\n- Faire appeler le 15 par un(e) collègue\n- Faire évacuer les autres enfants dans une autre pièce\n6. Reprendre au plus vite le massage cardiaque\n7. POURSUIVRE 15 compressions / 2 insufflations jusqu'à l'arrivée des secours\n8. Avertir la responsable d'établissement\n9. Téléphoner aux parents",
    notes:"ENFANT < 1 AN : 2 doigts au milieu de la poitrine, enfoncer 3 cm, rythme 100/min. Prendre bouche ET nez dans la bouche.\nENFANT > 1 AN : paume de la main, 1 bras tendu, enfoncer 3-4 cm, rythme 100/min. Boucher le nez.\nSi reprise d'une respiration : mettre en position latérale de sécurité (PLS)." },
];

const STORAGE_KEY = "creche_documents_db";
let documents = [];
try { const d = localStorage.getItem(STORAGE_KEY); documents = d ? JSON.parse(d) : DOCS_DEFAUT; } catch { documents = DOCS_DEFAUT; }
let nextId = Math.max(...documents.map(d => d.id), 0) + 1;
let vue = "liste";
let recherche = "";
let filtreCategorie = "toutes";
let filtreStatut = "tous";
let docSelectionne = null;
let formulaire = null;

function sauverLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(documents)); } catch {} }
function getCat(id) { return CATEGORIES.find(c => c.id === id) || { label:id, icon:"📄", color:"#ccc" }; }
function getStat(id) { return STATUTS.find(s => s.id === id) || { label:id, color:"#ccc" }; }

function afficherNotif(msg, type) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.style.background = type === "error" ? "#e74c3c" : "#2ecc71";
  el.textContent = msg;
  document.getElementById('notif-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function filtres() {
  return documents.filter(doc => {
    const q = recherche.toLowerCase();
    return (!q || doc.titre.toLowerCase().includes(q) || doc.description.toLowerCase().includes(q) || doc.responsable.toLowerCase().includes(q))
      && (filtreCategorie === "toutes" || doc.categorie === filtreCategorie)
      && (filtreStatut === "tous" || doc.statut === filtreStatut);
  });
}

function ouvrirFormulaire(doc) {
  formulaire = doc ? {...doc} : { titre:"", categorie:"hygiene", statut:"vigueur", dateRevision:new Date().toISOString().split("T")[0], description:"", responsable:"", version:"v1.0", objectif:"", etapes:"", notes:"" };
  vue = "formulaire";
  render();
}

function sauvegarderDocument() {
  if (!formulaire.titre.trim()) { afficherNotif("Le titre est obligatoire", "error"); return; }
  if (formulaire.id) {
    documents = documents.map(d => d.id === formulaire.id ? formulaire : d);
    afficherNotif("Document mis à jour ✓");
  } else {
    documents.push({...formulaire, id: nextId++});
    afficherNotif("Document ajouté ✓");
  }
  sauverLocal(); formulaire = null; vue = "liste"; render();
}

function collectFormulaire() {
  formulaire.titre = document.getElementById('f-titre').value;
  formulaire.version = document.getElementById('f-version').value;
  formulaire.categorie = document.getElementById('f-cat').value;
  formulaire.statut = document.getElementById('f-statut').value;
  formulaire.responsable = document.getElementById('f-resp').value;
  formulaire.dateRevision = document.getElementById('f-date').value;
  formulaire.description = document.getElementById('f-desc').value;
  formulaire.objectif = document.getElementById('f-objectif').value;
  formulaire.etapes = document.getElementById('f-etapes').value;
  formulaire.notes = document.getElementById('f-notes').value;
}

function supprimerDocument(id) {
  if (!confirm("Supprimer ce document ?")) return;
  documents = documents.filter(d => d.id !== id);
  sauverLocal(); docSelectionne = null; vue = "liste";
  afficherNotif("Document supprimé"); render();
}

function stats() {
  return { total:documents.length, vigueur:documents.filter(d=>d.statut==="vigueur").length, revision:documents.filter(d=>d.statut==="revision").length, archive:documents.filter(d=>d.statut==="archive").length };
}

function formatEtapes(etapes, catColor) {
  if (!etapes) return '';
  return etapes.split('\n').map(line => {
    line = line.trim(); if (!line) return '';
    if (/^\d+[.)]/.test(line)) {
      const num = line.match(/^\d+/)[0];
      const txt = line.replace(/^\d+[.)]\s*/, '');
      return '<div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start"><span style="background:'+catColor+';color:#fff;min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">'+num+'</span><span style="padding-top:3px;line-height:1.5">'+txt+'</span></div>';
    }
    if (/^[-•*]/.test(line)) {
      return '<div style="padding-left:36px;margin-bottom:6px;color:var(--ink2);font-size:13px;line-height:1.5">▸ '+line.replace(/^[-•*]\s*/,'')+'</div>';
    }
    return '<div style="padding-left:36px;margin-bottom:6px;color:var(--ink2);font-size:13px;line-height:1.5">'+line+'</div>';
  }).join('');
}

function imprimerFiche(id) {
  const doc = documents.find(d => d.id === id); if (!doc) return;
  const cat = getCat(doc.categorie);
  const stat = getStat(doc.statut);
  const etapesHtml = doc.etapes ? doc.etapes.split('\n').map(line => {
    line = line.trim(); if (!line) return '';
    if (/^\d+[.)]/.test(line)) return '<div class="step"><span class="sn">'+line.match(/^\d+/)[0]+'</span><span>'+line.replace(/^\d+[.)]\s*/,'')+'</span></div>';
    if (/^[-•*]/.test(line)) return '<div class="ss">▸ '+line.replace(/^[-•*]\s*/,'')+'</div>';
    return '<div class="ss">'+line+'</div>';
  }).join('') : '';
  const notesHtml = doc.notes ? doc.notes.split('\n').filter(l=>l.trim()).map(l=>'<div class="nl"><span>⚠️</span><span>'+l.trim()+'</span></div>').join('') : '';

  const w = window.open('', '_blank');

// ── IMPORT WORD / PDF ────────────────────────────────────────────
async function importerFichier(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  afficherNotif('⏳ Lecture du fichier en cours…');
  try {
    let texte = '';
    if (file.name.endsWith('.docx')) {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer });
      texte = result.value;
    } else if (file.name.endsWith('.pdf')) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        texte += content.items.map(item => item.str).join(' ') + '\n';
      }
    }
    if (!texte.trim()) { afficherNotif('⚠ Impossible de lire le fichier', 'error'); return; }
    formulaire = analyserTexteProtocole(texte, file.name);
    vue = 'formulaire';
    render();
    afficherNotif('✅ Fichier importé — vérifiez et complétez les champs');
  } catch(e) {
    afficherNotif('⚠ Erreur : ' + e.message, 'error');
  }
}

function analyserTexteProtocole(texte, nomFichier) {
  const lignes = texte.split('\n').map(l => l.trim()).filter(l => l);
  const titre = (lignes[0] && lignes[0].length < 100) ? lignes[0] : nomFichier.replace(/\.(docx|pdf)$/i,'').replace(/[-_]/g,' ');
  const txt = texte.toLowerCase();
  let categorie = 'administratif';
  if (/cardio|arrêt|réanimation|rcp|urgence|accident|incendie|évacuation/.test(txt)) categorie = 'urgence';
  else if (/hygiène|change|lavage|désinfection/.test(txt)) categorie = 'hygiene';
  else if (/médicament|fièvre|maladie|santé|soin/.test(txt)) categorie = 'sante';
  else if (/alimentaire|alimentation|repas|allergie/.test(txt)) categorie = 'alimentation';
  else if (/pédagogi|activité|éveil|motricité/.test(txt)) categorie = 'pedagogie';
  else if (/sécurité|incendie|danger/.test(txt)) categorie = 'securite';
  else if (/accueil|adaptation|famille|parent/.test(txt)) categorie = 'accueil';

  const etapesLines = lignes.filter(l => /^\d+[\.\)]\s/.test(l) || /^[•\-\*]\s/.test(l));
  const etapes = etapesLines.join('\n');
  const notesMatch = texte.match(/(?:nb\s*:|note\s*:|important\s*:|attention\s*:)([\s\S]*?)(?=\n\s*\n|$)/gi);
  const notes = notesMatch ? notesMatch.map(n => n.trim()).join('\n') : '';
  const objectifMatch = texte.match(/objectif[s]?\s*[:\-]?\s*([^\n]{20,200})/i);
  const objectif = objectifMatch ? objectifMatch[1].trim() : '';
  const descLignes = lignes.slice(1, 4).filter(l => !/^\d+[\.\)]/.test(l) && l.length > 20);
  const description = descLignes.join(' ').slice(0, 200) || titre;

  return { titre, categorie, statut:'vigueur', dateRevision:new Date().toISOString().split('T')[0], description, responsable:'', version:'v1.0', objectif, etapes, notes };
}
