<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Base Documentaire — Protocoles Crèche</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --ink: #1C1917;
    --ink2: #44403C;
    --ink3: #A8A29E;
    --border: #E7E5E0;
    --accent: #5C6BC0;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
  }
  .app-header p { font-size: 12px; color: var(--ink3); margin-top: 2px; }

  /* ── LAYOUT ── */
  .app-body { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    box-shadow: var(--shadow);
    border-top: 3px solid var(--accent);
  }
  .stat-card .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-card .stat-lbl { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── FILTRES ── */
  .filtres-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 2;
    min-width: 200px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    background: var(--surface);
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .select-filtre {
    flex: 1;
    min-width: 150px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    background: var(--surface);
    cursor: pointer;
    font-family: 'Instrument Sans', sans-serif;
  }
  .vue-btns { display: flex; gap: 6px; }
  .vue-btn {
    width: 38px; height: 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .vue-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── LISTE ── */
  .liste-container { display: flex; flex-direction: column; gap: 8px; }
  .liste-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .liste-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .cat-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .doc-titre { font-weight: 700; font-size: 15px; color: var(--ink); }
  .doc-desc {
    margin: 5px 0 8px;
    font-size: 13px;
    color: var(--ink3);
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }
  .doc-meta { display: flex; gap: 14px; font-size: 12px; color: var(--ink3); flex-wrap: wrap; }
  .badge {
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
  }
  .statut-pill {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    display: inline-block;
  }

  /* ── GRILLE ── */
  .grille-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .carte-doc {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 180px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .carte-doc:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }

  /* ── CATÉGORIES ── */
  .grille-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 8px; }
  .carte-cat {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }
  .carte-cat:hover { transform: translateY(-1px); }

  /* ── DÉTAIL ── */
  .detail-page { max-width: 700px; margin: 0 auto; }
  .detail-card { background: var(--surface); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .detail-item { background: var(--bg); border-radius: 10px; padding: 14px 16px; }
  .detail-label { font-size: 11px; color: var(--ink3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }

  /* ── FORMULAIRE ── */
  .form-card { background: var(--surface); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); max-width: 700px; margin: 0 auto; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 600; color: var(--ink2); }
  input, select, textarea {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 14px;
    outline: none;
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 100px; resize: vertical; }

  /* ── BOUTONS ── */
  .btn-primary {
    padding: 11px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Instrument Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    padding: 11px 24px;
    background: var(--surface);
    color: var(--ink2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Instrument Sans', sans-serif;
  }
  .btn-danger { color: #e74c3c; border-color: #e74c3c; }
  .btn-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Instrument Sans', sans-serif;
    padding: 0;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── NOTIFICATION ── */
  .notif {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

  .vide { text-align: center; color: var(--ink3); padding: 40px; font-size: 15px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin: 32px 0 14px; color: var(--ink2); }
  .chevron { color: var(--ink3); font-size: 20px; margin-left: 8px; flex-shrink: 0; }
  .count-info { color: var(--ink3); font-size: 13px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <h1>📚 Base Documentaire</h1>
    <p>Protocoles & documents de fonctionnement de la crèche</p>
  </div>
  <button class="btn-primary" onclick="ouvrirFormulaire()">+ Ajouter un document</button>
</div>

<div id="notif-container"></div>
<div id="app" class="app-body"></div>

<script>
const CATEGORIES = [
  { id: "hygiene",       label: "Hygiène & Soins",           icon: "🧼", color: "#4ECDC4" },
  { id: "securite",      label: "Sécurité",                  icon: "🛡️", color: "#FF6B6B" },
  { id: "sante",         label: "Santé & Médicaments",       icon: "💊", color: "#45B7D1" },
  { id: "alimentation",  label: "Alimentation",              icon: "🍽️", color: "#96CEB4" },
  { id: "pedagogie",     label: "Pédagogie & Activités",     icon: "🎨", color: "#FFEAA7" },
  { id: "administratif", label: "Administratif",             icon: "📋", color: "#DDA0DD" },
  { id: "urgence",       label: "Urgences",                  icon: "🚨", color: "#FF8C00" },
  { id: "accueil",       label: "Accueil & Communication",   icon: "👶", color: "#98D8C8" },
];

const STATUTS = [
  { id: "vigueur",  label: "En vigueur", color: "#2ecc71" },
  { id: "revision", label: "À réviser",  color: "#f39c12" },
  { id: "archive",  label: "Archivé",    color: "#95a5a6" },
];

const DOCS_DEFAUT = [
  { id:1,  titre:"Protocole de change et hygiène du nourrisson",      categorie:"hygiene",       statut:"vigueur",  dateRevision:"2024-09-01", description:"Procédure complète pour le change, le lavage des mains, la désinfection du matériel.", responsable:"Directrice", version:"v2.1" },
  { id:2,  titre:"Plan d'évacuation incendie",                         categorie:"securite",      statut:"vigueur",  dateRevision:"2024-06-15", description:"Itinéraires d'évacuation, point de rassemblement, rôles de chaque membre du personnel.", responsable:"Responsable sécurité", version:"v1.3" },
  { id:3,  titre:"Protocole de gestion des médicaments",               categorie:"sante",         statut:"vigueur",  dateRevision:"2024-01-10", description:"Conditions de stockage, administration sur ordonnance, registre de suivi.", responsable:"Infirmière", version:"v3.0" },
  { id:4,  titre:"Procédure d'introduction alimentaire",               categorie:"alimentation",  statut:"revision", dateRevision:"2023-11-20", description:"Diversification alimentaire progressive, allergènes, textures par tranche d'âge.", responsable:"Puéricultrice", version:"v1.8" },
  { id:5,  titre:"Protocole conduite à tenir en cas de fièvre",        categorie:"sante",         statut:"vigueur",  dateRevision:"2024-03-05", description:"Seuils d'alerte, mesures de température, contact avec les parents et le médecin.", responsable:"Infirmière", version:"v2.0" },
  { id:6,  titre:"Règlement intérieur de la crèche",                   categorie:"administratif", statut:"vigueur",  dateRevision:"2024-01-01", description:"Horaires, facturation, droits et obligations des familles et du personnel.", responsable:"Directrice", version:"v4.2" },
  { id:7,  titre:"Projet pédagogique annuel",                          categorie:"pedagogie",     statut:"vigueur",  dateRevision:"2024-09-01", description:"Objectifs éducatifs, thèmes mensuels, activités d'éveil et de motricité.", responsable:"Équipe pédagogique", version:"v2025" },
  { id:8,  titre:"Protocole d'accueil de l'enfant porteur de handicap",categorie:"accueil",       statut:"revision", dateRevision:"2023-07-12", description:"Aménagements, partenariats avec les professionnels de santé spécialisés.", responsable:"Directrice", version:"v1.0" },
  { id:9,  titre:"Fiche de conduite en cas d'accident",                categorie:"urgence",       statut:"vigueur",  dateRevision:"2024-02-28", description:"Numéros d'urgence, premiers secours, rédaction du rapport d'incident.", responsable:"Toute l'équipe", version:"v2.3" },
  { id:10, titre:"Protocole d'adaptation (période de familiarisation)",categorie:"accueil",       statut:"vigueur",  dateRevision:"2024-08-20", description:"Étapes de l'adaptation progressive, rôle des parents, suivi du bien-être de l'enfant.", responsable:"Référente de section", version:"v1.5" },
];

const STORAGE_KEY = "creche_documents_db";
let documents = [];
try { documents = JSON.parse(localStorage.getItem(STORAGE_KEY)) || DOCS_DEFAUT; } catch { documents = DOCS_DEFAUT; }
let nextId = Math.max(...documents.map(d => d.id), 0) + 1;

let vue = "liste";
let recherche = "";
let filtreCategorie = "toutes";
let filtreStatut = "tous";
let docSelectionne = null;
let formulaire = null;

function sauverLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(documents)); } catch {} }

function getCategorie(id) { return CATEGORIES.find(c => c.id === id) || { label: id, icon: "📄", color: "#ccc" }; }
function getStatut(id) { return STATUTS.find(s => s.id === id) || { label: id, color: "#ccc" }; }

function afficherNotif(msg, type = "success") {
  const el = document.createElement('div');
  el.className = 'notif';
  el.style.background = type === "error" ? "#e74c3c" : "#2ecc71";
  el.textContent = msg;
  document.getElementById('notif-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function docsFiltres() {
  return documents.filter(doc => {
    const q = recherche.toLowerCase();
    const matchQ = !q || doc.titre.toLowerCase().includes(q) || doc.description.toLowerCase().includes(q) || doc.responsable.toLowerCase().includes(q);
    const matchCat = filtreCategorie === "toutes" || doc.categorie === filtreCategorie;
    const matchStat = filtreStatut === "tous" || doc.statut === filtreStatut;
    return matchQ && matchCat && matchStat;
  });
}

function ouvrirFormulaire(doc = null) {
  formulaire = doc ? { ...doc } : {
    titre: "", categorie: "hygiene", statut: "vigueur",
    dateRevision: new Date().toISOString().split("T")[0],
    description: "", responsable: "", version: "v1.0"
  };
  vue = "formulaire";
  render();
}

function sauvegarderDocument() {
  if (!formulaire.titre.trim()) { afficherNotif("Le titre est obligatoire", "error"); return; }
  if (formulaire.id) {
    documents = documents.map(d => d.id === formulaire.id ? formulaire : d);
    afficherNotif("Document mis à jour ✓");
  } else {
    documents.push({ ...formulaire, id: nextId++ });
    afficherNotif("Document ajouté ✓");
  }
  sauverLocal();
  formulaire = null;
  vue = "liste";
  render();
}

function supprimerDocument(id) {
  if (!confirm("Supprimer ce document ?")) return;
  documents = documents.filter(d => d.id !== id);
  sauverLocal();
  docSelectionne = null;
  vue = "liste";
  afficherNotif("Document supprimé");
  render();
}

function stats() {
  return {
    total: documents.length,
    vigueur: documents.filter(d => d.statut === "vigueur").length,
    revision: documents.filter(d => d.statut === "revision").length,
    archive: documents.filter(d => d.statut === "archive").length,
  };
}

function render() {
  const app = document.getElementById('app');

  // ── FORMULAIRE ──
  if (vue === "formulaire") {
    app.innerHTML = `
      <div class="detail-page">
        <button class="btn-back" onclick="vue='liste';formulaire=null;render()">← Retour</button>
        <div class="form-card">
          <h2 style="font-family:'Syne',sans-serif;margin-bottom:24px">${formulaire.id ? "✏️ Modifier le document" : "➕ Nouveau document"}</h2>
          <div class="form-grid">
            <div class="form-group"><label>Titre *</label>
              <input id="f-titre" value="${formulaire.titre}" placeholder="Nom du protocole ou document"></div>
            <div class="form-group"><label>Version</label>
              <input id="f-version" value="${formulaire.version}" placeholder="ex: v1.0"></div>
            <div class="form-group"><label>Catégorie</label>
              <select id="f-cat">${CATEGORIES.map(c => `<option value="${c.id}" ${formulaire.categorie===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}</select></div>
            <div class="form-group"><label>Statut</label>
              <select id="f-statut">${STATUTS.map(s => `<option value="${s.id}" ${formulaire.statut===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div>
            <div class="form-group"><label>Responsable</label>
              <input id="f-resp" value="${formulaire.responsable}" placeholder="Nom ou rôle"></div>
            <div class="form-group"><label>Date de révision</label>
              <input id="f-date" type="date" value="${formulaire.dateRevision}"></div>
            <div class="form-group full"><label>Description</label>
              <textarea id="f-desc">${formulaire.description}</textarea></div>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px">
            <button class="btn-secondary" onclick="vue='liste';formulaire=null;render()">Annuler</button>
            <button class="btn-primary" onclick="collectFormulaire();sauvegarderDocument()">💾 Enregistrer</button>
          </div>
        </div>
      </div>`;
    return;
  }

  // ── DÉTAIL ──
  if (vue === "detail" && docSelectionne) {
    const doc = documents.find(d => d.id === docSelectionne);
    if (!doc) { vue = "liste"; render(); return; }
    const cat = getCategorie(doc.categorie);
    const stat = getStatut(doc.statut);
    app.innerHTML = `
      <div class="detail-page">
        <button class="btn-back" onclick="vue='liste';docSelectionne=null;render()">← Retour à la liste</button>
        <div class="detail-card">
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
            <div class="cat-icon" style="background:${cat.color}22;color:${cat.color};width:56px;height:56px;font-size:28px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center">${cat.icon}</div>
            <div>
              <h2 style="font-family:'Syne',sans-serif;font-size:20px;margin-bottom:6px">${doc.titre}</h2>
              <span class="badge" style="background:${cat.color}22;color:${cat.color}">${cat.label}</span>
            </div>
          </div>
          <div class="detail-grid">
            <div class="detail-item"><span class="detail-label">Statut</span><span class="statut-pill" style="background:${stat.color}22;color:${stat.color}">${stat.label}</span></div>
            <div class="detail-item"><span class="detail-label">Version</span><strong>${doc.version}</strong></div>
            <div class="detail-item"><span class="detail-label">Responsable</span><strong>${doc.responsable}</strong></div>
            <div class="detail-item"><span class="detail-label">Dernière révision</span><strong>${new Date(doc.dateRevision).toLocaleDateString('fr-FR')}</strong></div>
          </div>
          <div style="background:var(--bg);border-radius:12px;padding:18px;margin-top:4px">
            <span class="detail-label">Description</span>
            <p style="margin-top:8px;line-height:1.7;color:var(--ink2)">${doc.description}</p>
          </div>
          <div style="display:flex;gap:12px;margin-top:24px">
            <button class="btn-primary" onclick="ouvrirFormulaire(documents.find(d=>d.id===${doc.id}))">✏️ Modifier</button>
            <button class="btn-secondary btn-danger" onclick="supprimerDocument(${doc.id})">🗑 Supprimer</button>
          </div>
        </div>
      </div>`;
    return;
  }

  // ── LISTE PRINCIPALE ──
  const s = stats();
  const filtered = docsFiltres();
  const statColors = { total:"#5c6bc0", vigueur:"#2ecc71", revision:"#f39c12", archive:"#95a5a6" };

  app.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="border-top-color:#5c6bc0"><span style="font-size:24px">📄</span><span class="stat-num" style="color:#5c6bc0">${s.total}</span><span class="stat-lbl">Total</span></div>
      <div class="stat-card" style="border-top-color:#2ecc71"><span style="font-size:24px">✅</span><span class="stat-num" style="color:#2ecc71">${s.vigueur}</span><span class="stat-lbl">En vigueur</span></div>
      <div class="stat-card" style="border-top-color:#f39c12"><span style="font-size:24px">⚠️</span><span class="stat-num" style="color:#f39c12">${s.revision}</span><span class="stat-lbl">À réviser</span></div>
      <div class="stat-card" style="border-top-color:#95a5a6"><span style="font-size:24px">🗂️</span><span class="stat-num" style="color:#95a5a6">${s.archive}</span><span class="stat-lbl">Archivés</span></div>
    </div>

    <div class="filtres-bar">
      <input class="search-input" placeholder="🔍 Rechercher un document..." value="${recherche}" oninput="recherche=this.value;render()">
      <select class="select-filtre" onchange="filtreCategorie=this.value;render()">
        <option value="toutes" ${filtreCategorie==='toutes'?'selected':''}>Toutes les catégories</option>
        ${CATEGORIES.map(c => `<option value="${c.id}" ${filtreCategorie===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
      </select>
      <select class="select-filtre" onchange="filtreStatut=this.value;render()">
        <option value="tous" ${filtreStatut==='tous'?'selected':''}>Tous les statuts</option>
        ${STATUTS.map(s => `<option value="${s.id}" ${filtreStatut===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
      <div class="vue-btns">
        <button class="vue-btn ${vue==='liste'?'active':''}" onclick="vue='liste';render()" title="Vue liste">☰</button>
        <button class="vue-btn ${vue==='grille'?'active':''}" onclick="vue='grille';render()" title="Vue grille">⊞</button>
      </div>
    </div>

    <p class="count-info">${filtered.length} document${filtered.length!==1?'s':''} trouvé${filtered.length!==1?'s':''}</p>

    ${vue === 'liste' ? `
    <div class="liste-container">
      ${filtered.length === 0 ? '<div class="vide">Aucun document trouvé</div>' :
        filtered.map(doc => {
          const cat = getCategorie(doc.categorie);
          const stat = getStatut(doc.statut);
          return `<div class="liste-item" onclick="docSelectionne=${doc.id};vue='detail';render()">
            <div class="cat-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                <span class="doc-titre">${doc.titre}</span>
                <span class="badge" style="background:${cat.color}22;color:${cat.color}">${cat.label}</span>
                <span class="statut-pill" style="background:${stat.color}22;color:${stat.color}">${stat.label}</span>
              </div>
              <p class="doc-desc">${doc.description}</p>
              <div class="doc-meta">
                <span>👤 ${doc.responsable}</span>
                <span>📅 ${new Date(doc.dateRevision).toLocaleDateString('fr-FR')}</span>
                <span>🔖 ${doc.version}</span>
              </div>
            </div>
            <span class="chevron">›</span>
          </div>`;
        }).join('')}
    </div>` : `
    <div class="grille-container">
      ${filtered.length === 0 ? '<div class="vide">Aucun document trouvé</div>' :
        filtered.map(doc => {
          const cat = getCategorie(doc.categorie);
          const stat = getStatut(doc.statut);
          return `<div class="carte-doc" style="border-top:4px solid ${cat.color}" onclick="docSelectionne=${doc.id};vue='detail';render()">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <span style="font-size:28px">${cat.icon}</span>
              <span class="statut-pill" style="background:${stat.color}22;color:${stat.color}">${stat.label}</span>
            </div>
            <h3 style="font-size:14px;color:var(--ink);line-height:1.4;margin-bottom:8px">${doc.titre}</h3>
            <p class="doc-desc" style="font-size:12px;-webkit-line-clamp:2">${doc.description}</p>
            <div class="doc-meta" style="margin-top:auto;padding-top:10px">
              <span>👤 ${doc.responsable}</span>
              <span>🔖 ${doc.version}</span>
            </div>
          </div>`;
        }).join('')}
    </div>`}

    <p class="section-title">Parcourir par catégorie</p>
    <div class="grille-cats">
      ${CATEGORIES.map(cat => {
        const nb = documents.filter(d => d.categorie === cat.id).length;
        return `<div class="carte-cat" style="border-left:4px solid ${cat.color}" onclick="filtreCategorie='${cat.id}';filtreStatut='tous';recherche='';window.scrollTo(0,0);render()">
          <span style="font-size:24px">${cat.icon}</span>
          <div>
            <div style="font-weight:700;font-size:14px">${cat.label}</div>
            <div style="font-size:12px;color:var(--ink3)">${nb} document${nb!==1?'s':''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function collectFormulaire() {
  formulaire.titre = document.getElementById('f-titre').value;
  formulaire.version = document.getElementById('f-version').value;
  formulaire.categorie = document.getElementById('f-cat').value;
  formulaire.statut = document.getElementById('f-statut').value;
  formulaire.responsable = document.getElementById('f-resp').value;
  formulaire.dateRevision = document.getElementById('f-date').value;
  formulaire.description = document.getElementById('f-desc').value;
}

render();
</script>
</body>
</html>
